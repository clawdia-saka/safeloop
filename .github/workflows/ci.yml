name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Check public readiness packet
        run: python scripts/public_readiness.py --check

      - name: Generate and verify SafeLoop packet demo
        if: matrix.python-version == '3.12'
        run: |
          set -euo pipefail
          DEMO_JSON="$(safeloop demo --output-dir .safeloop/ci-demo --json)"
          printf '%s\n' "$DEMO_JSON"
          RUN_DIR="$(printf '%s\n' "$DEMO_JSON" | python -c 'import json, sys; print(json.load(sys.stdin)["run_dir"])')"
          safeloop operator-packet-verify "$RUN_DIR"

      - name: Upload SafeLoop packet demo
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: safeloop-packet-demo
          path: |
            .safeloop/ci-demo/demo-summary.json
            .safeloop/ci-demo/runs/**
          if-no-files-found: error

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*
