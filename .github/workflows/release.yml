name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and release dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"release tag {tag!r} does not match pyproject version {expected!r}")
          PY

      - name: Run tests
        run: python -m pytest -q

      - name: Check public readiness packet
        run: python scripts/public_readiness.py --check

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-distributions
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/project/safeloop/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: python-distributions
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
